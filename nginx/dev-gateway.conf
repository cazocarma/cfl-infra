limit_req_zone $binary_remote_addr zone=api_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=120r/m;

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 20m;
  server_tokens off;
  resolver 127.0.0.11 ipv6=off valid=10s;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  proxy_connect_timeout 5s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain always;
    add_header X-Content-Type-Options "nosniff" always;
    return 200 "ok\n";
  }

  location = /api/health {
    set $api_health http://api-backend:4000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_pass $api_health;
  }

  location = /api/authn/login {
    limit_req zone=api_login burst=5 nodelay;
    limit_req_status 429;

    set $api_upstream http://api-backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_pass $api_upstream;
  }

  location /api/ {
    limit_req zone=api_general burst=30 nodelay;
    limit_req_status 429;

    set $api_upstream http://api-backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_pass $api_upstream;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://front-ng:80;
  }
}
