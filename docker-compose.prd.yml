name: greenvic-cfl-${CFL_ENV:-prd}

# =============================================================================
# CFL — docker-compose.prd.yml (overlay PRODUCCION)
#
# Se usa automaticamente cuando CFL_ENV=prd en .env.
# Combinacion: docker compose -f docker-compose.yml -f docker-compose.prd.yml
#
# Define los overrides especificos de prd:
#   - NODE_ENV=production, LOG_LEVEL=info.
#   - OIDC URLs publicas -> 192.168.18.18:80 (router prd greenvic).
#   - Cookies secure + samesite=strict (requerido por el back).
#   - CORS_ORIGIN=http://192.168.18.18 (dominio publico).
#
# El base (docker-compose.yml) ya trae la imagen runtime con read_only,
# resource limits y healthcheck. Este overlay solo inyecta vars de ambiente.
#
# Reconstruir la imagen: `make up` la toma del stage runtime.
# =============================================================================

services:
  back:
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      # OIDC: browser -> Keycloak prd (router greenvic :8080).
      # Inerte hoy (CFL usa JWT propia); listo para migracion a BFF.
      OIDC_ISSUER_URL: http://192.168.18.18:8080/realms/CFLRealm
      OIDC_REDIRECT_URI: http://192.168.18.18:80/api/v1/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://192.168.18.18:80/login
      # Cookies endurecidas para prd.
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_SAMESITE: strict
      # CORS: dominio publico. Cambiar si se expone un hostname distinto.
      CORS_ORIGIN: http://192.168.18.18
