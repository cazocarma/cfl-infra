name: greenvic-cfl-${CFL_ENV:-prd}

# =============================================================================
# CFL — docker-compose base (prod-like).
# Alineado con platform/docs/PLATFORM_INTEGRATION_SPEC.md §6.
#
# Consume las redes externas de platform:
#   - platform_identity  (Keycloak, si la app lo usa)
#
# El router de platform (NGINX :80) alcanza este stack por los aliases
# `cfl-frontend` y `cfl-backend`.
#
# En dev, docker-compose.override.yml agrega bind mounts + hot-reload.
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  front-ng:
    build:
      context: ../cfl-front-ng
      dockerfile: Dockerfile
    image: cfl-front-ng:${CFL_ENV:-prd}
    container_name: cfl-front-${CFL_ENV:-prd}
    init: true
    restart: unless-stopped
    pull_policy: never
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    expose:
      - "3000"
    networks:
      default:
        aliases:
          - cfl-frontend
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q -O - http://127.0.0.1:3000/healthz > /dev/null 2>&1 || exit 1"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  back:
    build:
      context: ../cfl-back
      dockerfile: Dockerfile
      target: runtime
    image: cfl-back:${CFL_ENV:-prd}
    container_name: cfl-back-${CFL_ENV:-prd}
    init: true
    restart: unless-stopped
    pull_policy: never
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    env_file:
      - ./.env
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "${PORT:-4000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "4000"
    networks:
      default:
        aliases:
          - cfl-backend
      identity:
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://127.0.0.1:4000/health',r=>process.exit(r.statusCode>=200&&r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

networks:
  default:
    external: true
    name: greenvic-cfl-${CFL_ENV:-prd}_default
  identity:
    external: true
    name: platform_identity
