name: greenvic-cfl-${CFL_ENV}

x-node-service: &node-service
  image: node:20-bookworm-slim@sha256:a82f40540f5959e0003fb7b3c0f80490def2927be8bdbee7e3e0ac65cce3be92
  init: true
  restart: unless-stopped
  pull_policy: if_not_present
  security_opt:
    - no-new-privileges:true
  environment:
    NODE_ENV: "${NODE_ENV:-development}"
    NPM_CONFIG_FETCH_RETRIES: "5"
    NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
    NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
    NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
    NPM_CONFIG_AUDIT: "false"
    NPM_CONFIG_FUND: "false"
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  front-ng:
    build:
      context: ../cfl-front-ng
      dockerfile: Dockerfile
    image: cfl-front-ng:${CFL_ENV:-prd}
    init: true
    restart: unless-stopped
    pull_policy: if_not_present
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    expose:
      - "3000"
    networks:
      default:
        aliases:
          - ${CFL_FRONTEND_ALIAS:-cfl-frontend}
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/healthz > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  back:
    <<: *node-service
    profiles: ["node"]
    working_dir: /workspace/cfl-back
    env_file:
      - ./.env
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    environment:
      NODE_ENV: "${NODE_ENV:-development}"
      NPM_CONFIG_FETCH_RETRIES: "5"
      NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      PORT: "${PORT:-4000}"
    expose:
      - "4000"
    networks:
      default:
        aliases:
          - ${CFL_BACKEND_ALIAS:-cfl-backend}
      egress:
      identity:
    volumes:
      - ../cfl-back:/workspace/cfl-back
      - back-node_modules:/workspace/cfl-back/node_modules
      - npm-cache:/root/.npm
    command: >
      sh -lc "if [ ! -f node_modules/express/package.json ] || [ ! -f node_modules/mssql/package.json ]; then npm install --prefer-offline --no-audit --no-fund; fi && npm run dev"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:4000/health',r=>process.exit(r.statusCode>=200&&r.statusCode<500?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  npm-cache:
  back-node_modules:

networks:
  default:
    external: true
    name: greenvic-cfl-${CFL_ENV}_default
  egress:
    name: greenvic-cfl-${CFL_ENV}_egress
  identity:
    external: true
    name: platform_identity
