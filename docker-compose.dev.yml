# =============================================================================
# CFL — docker-compose.dev.yml (local dev overlay)
# Se carga SOLO cuando CFL_ENV=dev (via Makefile). No se auto-loadea.
#
# Diseno:
#   - Back corre `node --watch` sobre /app/src (bind mount :ro).
#   - node_modules baked en la imagen (stage `dev`); sin install en runtime.
#   - Cambios en package.json requieren `make up` (rebuild). Cambios en src/
#     se reflejan por watch.
#   - Front corre `ng serve` con hot-reload.
#   - Lift de limites de memoria: esbuild/Angular piden mas que prd.
#
# Requisitos:
#   - `platform` arriba en el mismo host con PLATFORM_ENV=dev.
#   - CFL_ENV=dev en .env.
# =============================================================================

services:
  back:
    image: cfl-back:dev
    container_name: cfl-back-dev
    build:
      target: dev
    read_only: false
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      # ── OIDC: browser -> Keycloak local (via router de platform)
      # Inerte hoy (CFL usa AUTHN_JWT_SECRET propia); queda pre-provisionado
      # para la migracion a BFF OIDC.
      OIDC_ISSUER_URL: http://localhost:8080/realms/CFLRealm
      OIDC_REDIRECT_URI: http://localhost:80/api/v1/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:80/login
      # ── Cookies relajadas (HTTP plano en dev)
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: lax
      # ── CORS local: el front servido por el router en :80 no lo necesita,
      # pero cuando se corre `ng serve` directamente, el origen es :4200.
      CORS_ORIGIN: http://localhost
    volumes:
      - ../cfl-back/src:/app/src:ro
      - ../cfl-back/package.json:/app/package.json:ro
      - ../cfl-back/package-lock.json:/app/package-lock.json:ro

  front-ng:
    image: cfl-front-ng:dev
    container_name: cfl-front-dev
    build:
      target: builder
    read_only: false
    user: "0:0"
    command:
      - "sh"
      - "-lc"
      - "npx ng serve --host 0.0.0.0 --port 3000 --poll 1000 --allowed-hosts=all"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    volumes:
      - ../cfl-front-ng/src:/app/src:cached
