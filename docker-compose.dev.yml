name: greenvic-cfl-${CFL_ENV:-dev}

# =============================================================================
# CFL — docker-compose.dev.yml (overlay DESARROLLO LOCAL)
#
# Se usa automaticamente cuando CFL_ENV=dev en .env.
# Combinacion: docker compose -f docker-compose.yml -f docker-compose.dev.yml
#
# Define los overrides especificos de dev:
#   - Back con build target `dev`, `node --watch` sobre /app/src.
#   - Front con `ng serve` hot-reload (target `builder`, memory lift a 2G).
#   - NODE_ENV=development, LOG_LEVEL=debug.
#   - OIDC URLs publicas -> localhost:80 (via router de platform dev).
#   - Cookies relajadas (SECURE=false, SAMESITE=lax) para HTTP plano.
#   - CORS_ORIGIN=http://localhost (para `ng serve` directo en :4200).
#
# Requisitos:
#   - `platform` arriba con PLATFORM_ENV=dev (keycloak dev-mem + router).
#   - CFL_ENV=dev en .env.
# =============================================================================

services:
  back:
    image: cfl-back:dev
    container_name: cfl-back-dev
    build:
      target: dev
    read_only: false
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      # OIDC: browser -> Keycloak local (via router de platform dev en :8080).
      # Inerte hoy (CFL usa AUTHN_JWT_SECRET); listo para migracion a BFF.
      OIDC_ISSUER_URL: http://localhost:8080/realms/CFLRealm
      OIDC_REDIRECT_URI: http://localhost:80/api/v1/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:80/login
      # Cookies relajadas (HTTP plano en dev).
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: lax
      # CORS: el front via router en :80 no lo necesita, pero `ng serve` si
      # (origen http://localhost:4200).
      CORS_ORIGIN: http://localhost
    volumes:
      - ../cfl-back/src:/app/src:ro
      - ../cfl-back/package.json:/app/package.json:ro
      - ../cfl-back/package-lock.json:/app/package-lock.json:ro

  front-ng:
    image: cfl-front-ng:dev
    container_name: cfl-front-dev
    build:
      target: deps
    read_only: false
    user: "0:0"
    command:
      - "sh"
      - "-lc"
      - "npx ng serve --host 0.0.0.0 --port 3000 --poll 1000 --allowed-hosts=all"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    volumes:
      - ../cfl-front-ng/src:/app/src:cached
      - ../cfl-front-ng/angular.json:/app/angular.json:ro
      - ../cfl-front-ng/tsconfig.json:/app/tsconfig.json:ro
      - ../cfl-front-ng/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ../cfl-front-ng/tailwind.config.js:/app/tailwind.config.js:ro
      - ../cfl-front-ng/postcss.config.js:/app/postcss.config.js:ro
      - ../cfl-front-ng/package.json:/app/package.json:ro
